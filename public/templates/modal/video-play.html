<div class="modal modal-blur fade" id="video-play" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document" style="max-width:900px;">
        <div class="modal-content">
            <div class="modal-header" style="padding:10px 16px;border-bottom:1px solid #333;">
                <h5 class="modal-title" id="video-play-title" style="font-size:16px;">Video Player</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding:0;">
                <video id="videojs-player" class="video-js vjs-big-play-centered vjs-fluid" controls preload="auto"
                    style="width:100%;display:block;">
                    <p class="vjs-no-js">
                        您的浏览器不支持视频播放。
                    </p>
                </video>
            </div>

            <div class="row row-cards">
                <div id="video-file-info" style="display:flex;justify-content:center;align-items:center;gap:16px;border-top:1px solid #333;padding:8px 16px;">
                   
                    <span id="video-file-url"
                        style="font-size:12px; overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
                </div>
                <div id="video-custom-controls" style="display:flex;justify-content:center;align-items:center;gap:12px;border-top:1px solid #333;padding:8px 16px;">
                    <!-- Row1: 播放、时间、进度条、音量、倍速 -->
                </div>
                <div id="video-custom-controls-row2" style="display:flex;justify-content:center;align-items:center;gap:12px;border-top:1px solid #333;padding:8px 16px;">
                    <!-- Row2: PiP、全屏、-10、+10 -->
                </div>
                <div id="video-custom-controls-row3" style="display:flex;justify-content:center;align-items:center;gap:10px;border-top:1px solid #333;padding:10px 16px;">
                    <!-- Row3: 时间区间 -->
                </div>
            </div>

        </div>
    </div>
</div>
