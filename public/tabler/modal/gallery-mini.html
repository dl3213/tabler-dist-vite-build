<div style="display: none;">
    <div class="col-md-4 col-sm-12" template-id="entity">
        <div class="card">
            <div class="card-body">
                <div class="row row-cards">
                    <div class="col-9">
                        <div class="mb-3">
                            <input type="text" class="form-control-plaintext" name="example-disabled-input"
                                value="{realName}" disabled>
                        </div>
                    </div>
                    <div class="col">
                        <div class="mb-3">
                            <input type="text" class="form-control-plaintext" name="example-disabled-input"
                                value="{width} * {height}" disabled>
                        </div>
                    </div>
                </div>
            </div>
            <a data-fancybox="gallery" href="{apiUrl}{url}" class="d-block card-img-top entity " id="{id}" target-id="{id}"
                data-fslightbox="gallery">
                <img src="{apiUrl}{url}" class="card-img-top">
            </a>
        </div>
    </div>
</div>
