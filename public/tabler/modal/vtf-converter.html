<div class="modal modal-blur fade" id="modal-vtf-converter" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">🎮 VTF/VMT 格式转换</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <!-- 左侧：预览区域 -->
                    <div class="col-md-5">
                        <div class="mb-3">
                            <label class="form-label">图片预览</label>
                            <div class="border rounded p-2 text-center bg-light" style="min-height: 200px;">
                                <img id="vtf-preview-img" src="" alt="Preview" class="img-fluid" style="max-height: 300px; object-fit: contain;">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">图片信息</label>
                            <div id="vtf-image-info" class="small text-muted"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">文件大小估算</label>
                            <div id="vtf-file-size" class="alert alert-info small">选择图片后计算...</div>
                        </div>
                        <!-- Mipmap 级联贴图区域 -->
                        <div class="mb-3">
                            <label class="form-label">Mipmap 级联贴图（渐变效果）</label>
                            <small class="text-muted d-block mb-2">如需生成渐变喷漆(fadein效果)，先加载主图，启用 mipmap，然后选择另一张图片</small>
                            <input type="file" id="vtf-mipmap-file" class="form-control form-control-sm" accept="image/*" multiple>
                            <div id="vtf-mipmap-preview" class="mt-2"></div>
                        </div>
                    </div>
                    
                    <!-- 右侧：设置区域 -->
                    <div class="col-md-7">
                        <div class="row">
                            <!-- 纹理格式 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">纹理格式</label>
                                    <select id="vtf-format" class="form-select">
                                        <option value="0">RGBA8888 (32位 高质量)</option>
                                        <option value="12">BGRA8888 (32位)</option>
                                        <option value="2">RGB888 (24位 无透明)</option>
                                        <option value="3">BGR888 (24位 无透明)</option>
                                        <option value="4">RGB565 (16位)</option>
                                        <option value="21">BGRA5551 (16位)</option>
                                        <option value="19">BGRA4444 (16位)</option>
                                        <option value="13">DXT1 (压缩, 1位透明)</option>
                                        <option value="14">DXT3 (压缩, 4位透明)</option>
                                        <option value="15" selected>DXT5 (压缩, 8位透明 推荐)</option>
                                        <option value="5">I8 (8位灰度)</option>
                                        <option value="6">IA88 (灰度+透明)</option>
                                        <option value="8">A8 (8位透明通道)</option>
                                    </select>
                                </div>
                            </div>
                            <!-- 抽样方案 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">抽样方案</label>
                                    <select id="vtf-sampling" class="form-select">
                                        <option value="0" selected>默认</option>
                                        <option value="2">Point (Pixel art)</option>
                                        <option value="1">Trilinear</option>
                                        <option value="3">Anisotropic</option>
                                    </select>
                                    <small class="text-muted">不懂就选默认</small>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <!-- 压缩质量 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">压缩质量</label>
                                    <select id="vtf-quality" class="form-select">
                                        <option value="0">快速压缩</option>
                                        <option value="1">正常</option>
                                        <option value="2" selected>较慢（默认）</option>
                                        <option value="3">非常慢（质量较好）</option>
                                    </select>
                                </div>
                            </div>
                            <!-- 抖动选项 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <div class="form-check mt-2">
                                        <input class="form-check-input" type="checkbox" id="vtf-dither">
                                        <label class="form-check-label" for="vtf-dither">使用抖动</label>
                                    </div>
                                    <small class="text-muted">减少色彩渐变中的条带效应</small>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <!-- 宽度设置 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">宽度</label>
                                    <select id="vtf-width" class="form-select">
                                        <option value="auto">自动</option>
                                        <option value="1024">1024</option>
                                        <option value="768">768</option>
                                        <option value="720">720</option>
                                        <option value="512" selected>512</option>
                                        <option value="256">256</option>
                                        <option value="128">128</option>
                                        <option value="64">64</option>
                                        <option value="32">32</option>
                                        <option value="16">16</option>
                                        <option value="8">8</option>
                                        <option value="4">4</option>
                                        <option value="custom">自定义</option>
                                    </select>
                                    <input type="number" id="vtf-width-custom" class="form-control form-control-sm mt-1 d-none" placeholder="自定义宽度" min="1" max="4096">
                                </div>
                            </div>
                            <!-- 高度设置 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">高度</label>
                                    <select id="vtf-height" class="form-select">
                                        <option value="auto">自动</option>
                                        <option value="1024">1024</option>
                                        <option value="768">768</option>
                                        <option value="720">720</option>
                                        <option value="512" selected>512</option>
                                        <option value="256">256</option>
                                        <option value="128">128</option>
                                        <option value="64">64</option>
                                        <option value="32">32</option>
                                        <option value="16">16</option>
                                        <option value="8">8</option>
                                        <option value="4">4</option>
                                        <option value="custom">自定义</option>
                                    </select>
                                    <input type="number" id="vtf-height-custom" class="form-control form-control-sm mt-1 d-none" placeholder="自定义高度" min="1" max="4096">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <!-- Mipmaps 选项 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="vtf-mipmaps" checked>
                                        <label class="form-check-label" for="vtf-mipmaps">生成 Mipmaps</label>
                                    </div>
                                    <small class="text-muted">Mipmaps 是不同分辨率的版本，提升渲染性能</small>
                                </div>
                            </div>
                            <!-- 自动缩放 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="vtf-rescale" checked>
                                        <label class="form-check-label" for="vtf-rescale">自动缩放到合适位置</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- VMT 材质类型 -->
                        <div class="mb-3">
                            <label class="form-label">VMT 材质类型</label>
                            <select id="vmt-shader" class="form-select">
                                <option value="UnlitGeneric">UnlitGeneric (不受光照 喷漆推荐)</option>
                                <option value="LightmappedGeneric">LightmappedGeneric (受光照)</option>
                                <option value="VertexLitGeneric">VertexLitGeneric (顶点光照)</option>
                                <option value="Spectacle">Spectacle (透明材质)</option>
                            </select>
                        </div>

                        <!-- 输出文件名 -->
                        <div class="mb-3">
                            <label class="form-label">输出文件名</label>
                            <input type="text" id="vtf-filename" class="form-control" placeholder="spray">
                            <small class="text-muted">不含扩展名，会自动生成 .vtf 和 .vmt 文件</small>
                        </div>
                    </div>
                </div>

                <!-- 转换进度 -->
                <div id="vtf-progress" class="d-none">
                    <div class="progress mb-2">
                        <div class="progress-bar progress-bar-indeterminate"></div>
                    </div>
                    <p class="text-center text-muted small">正在转换中...</p>
                </div>

                <!-- VMT 预览 -->
                <div id="vmt-preview-container" class="mt-3">
                    <label class="form-label">VMT 内容预览</label>
                    <pre id="vmt-preview" class="bg-light p-3 rounded border small" style="max-height: 150px; overflow-y: auto;"></pre>
                </div>
            </div>
            <div class="modal-footer">
                <div class="text-end text-muted small me-auto">
                    <span id="vtf-conversion-status">就绪</span>
                </div>
                <button type="button" class="btn me-auto" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-info" id="btn-convert-vtf">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-refresh" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                        <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"></path>
                        <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"></path>
                    </svg>
                    转换
                </button>
                <button type="button" class="btn btn-primary" id="btn-download-vtf" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-download" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                        <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"></path>
                        <path d="M7 11l5 5l5 -5"></path>
                        <path d="M12 4l0 12"></path>
                    </svg>
                    保存为 VTF
                </button>
                <button type="button" class="btn btn-success" id="btn-download-vmt">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-file-text" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                        <path d="M14 3v4a1 1 0 0 0 1 1h4"></path>
                        <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"></path>
                        <path d="M9 9l1 0"></path>
                        <path d="M9 13l6 0"></path>
                        <path d="M9 17l4 0"></path>
                    </svg>
                    保存为 VMT
                </button>
            </div>
        </div>
    </div>
</div>
